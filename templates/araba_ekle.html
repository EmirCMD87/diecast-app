<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Araba Ekle - Diecast</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: #1e3c72;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
        }
        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            background: #218838;
        }
        .link {
            text-align: center;
            margin-top: 1rem;
        }
        .link a {
            color: #1e3c72;
            text-decoration: none;
        }
        .flash {
            padding: 0.75rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }
        .flash.success { background: #d4edda; color: #155724; }
        .flash.danger { background: #f8d7da; color: #721c24; }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GQS70MDDPQ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-GQS70MDDPQ');
    </script>
</head>
<body>
    <div class="container">
        <h1>➕ Yeni Araba Ekle</h1>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Araba İsmi</label>
                <input type="text" name="isim" placeholder="Örn: Lamborghini Aventador" required>
            </div>
            <div class="form-group">
                <label>Marka</label>
                <select name="marka" required>
                    <option value="">Seçiniz</option>
                    <option value="Hot Wheels">🔥 Hot Wheels</option>
                    <option value="Matchbox">📦 Matchbox</option>
                    <option value="Diğer">🚗 Diğer</option>
                </select>
            </div>
            <div class="form-group">
                <label>Renk</label>
                <select name="renk" required>
                    <option value="">Seçiniz</option>
                    <option value="Kırmızı">🔴 Kırmızı</option>
                    <option value="Mavi">🔵 Mavi</option>
                    <option value="Yeşil">🟢 Yeşil</option>
                    <option value="Siyah">⚫ Siyah</option>
                    <option value="Beyaz">⚪ Beyaz</option>
                    <option value="Sarı">🟡 Sarı</option>
                    <option value="Gümüş">🔘 Gümüş</option>
                    <option value="Turuncu">🟠 Turuncu</option>
                </select>
            </div>
            <div class="form-group">
                <label>Araba Fotoğrafı</label>
                <input type="file" name="resim" accept="image/*" required>
            </div>
            <button type="submit">💾 Arabamı Ekle</button>
        </form>
        
        <div class="link">
            <a href="{{ url_for('dashboard') }}">← Koleksiyonuma Dön</a>
        </div>
    </div>
</body>
</html>
